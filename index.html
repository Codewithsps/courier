<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courier Slip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0f14;
  --surface:   #151820;
  --surface2:  #1c1f2a;
  --border:    #272b38;
  --border2:   #2f3444;
  --accent:    #3d7fff;
  --accent-dim:#1e3f80;
  --green:     #22c97a;
  --red:       #ff5252;
  --amber:     #f0a500;
  --text:      #e2e6f0;
  --text-dim:  #8a90a2;
  --text-xs:   #545a6e;
  --input-bg:  #111318;
  --radius:    10px;
  --radius-sm: 7px;
  --shadow:    0 4px 24px rgba(0,0,0,0.45);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
  line-height: 1.5;
}

.page {
  max-width: 600px;
  margin: 0 auto;
  padding: 28px 20px 40px;
}

/* ── HEADER ── */
.hdr {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.hdr-logo {
  width: 48px; height: 48px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(61,127,255,0.35);
}
.hdr-info { flex: 1; }
.hdr-title {
  font-size: 17px; font-weight: 700; color: var(--text);
  letter-spacing: 0.01em;
}
.hdr-sub {
  font-size: 12px; color: var(--text-dim); margin-top: 3px;
}
.hdr-badge {
  background: var(--surface2);
  border: 1px solid var(--border2);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card.highlight {
  border-color: var(--accent-dim);
  box-shadow: 0 4px 24px rgba(61,127,255,0.12);
}

/* ── SECTION LABEL ── */
.sec-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-blue  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.dot-green { background: var(--green);  box-shadow: 0 0 6px var(--green); }

/* ── FORM FIELDS ── */
.fl { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.fl:last-child { margin-bottom: 0; }
.fl label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-xs);
}
.fl input,
.fl select,
.fl textarea {
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  padding: 9px 12px;
  background: var(--input-bg);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  width: 100%;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.fl input::placeholder, .fl textarea::placeholder { color: var(--text-xs); }
.fl input:focus, .fl select:focus, .fl textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(61,127,255,0.14);
  background: #0f1219;
}
.fl input[readonly] {
  background: #0f1116;
  color: var(--text-dim);
  cursor: not-allowed;
  border-color: var(--border);
}
.fl textarea { resize: none; height: 58px; }

.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* ── PIN ── */
.pin-wrap { display: flex; gap: 8px; }
.pin-wrap input { flex: 1; }
.pin-btn {
  padding: 9px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 0.03em;
}
.pin-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.pin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.pin-msg {
  font-size: 10.5px;
  font-weight: 500;
  min-height: 15px;
  margin-top: 4px;
  font-family: 'DM Mono', monospace;
}
.ok  { color: var(--green); }
.err { color: var(--red); }
.loading { color: var(--accent); }

/* ── ACTIONS ── */
.actions {
  display: flex;
  gap: 12px;
  margin-top: 4px;
}
.btn-gen {
  flex: 1;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(61,127,255,0.3);
}
.btn-gen:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(61,127,255,0.4); }
.btn-clr {
  padding: 14px 20px;
  background: transparent;
  color: var(--text-dim);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-clr:hover { border-color: var(--text-dim); color: var(--text); }

/* ─────────────── SLIP ─────────────── */
#slip-section { display: none; }

.slip-wrap {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}

.slip-label {
  background: #ffffff;
  color: #111;
  border: 2px solid #1a1a2e;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

.slip-lbody { padding: 28px 32px 24px; }

.to-kw {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: #aaa;
  text-align: center;
  margin-bottom: 8px;
}
.to-company {
  font-size: 28px;
  font-weight: 800;
  color: #0a1628;
  line-height: 1.15;
  letter-spacing: 0.5px;
  word-break: break-word;
  text-align: center;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.addr-block { text-align: center; margin-bottom: 4px; }
.addr-line {
  font-size: 14px;
  font-weight: 500;
  color: #333;
  line-height: 1.8;
  text-align: center;
  display: block;
  padding: 0;
}
.addr-line .val { color: #222; font-weight: 500; font-size: 14px; }

.pin-line {
  font-size: 20px;
  font-weight: 800;
  color: #0a1628;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.15em;
  padding: 10px 0 6px;
  text-align: center;
  border-top: 1px solid #eee;
  border-bottom: 1px solid #eee;
  margin: 12px 0;
}
.mob-line {
  font-size: 13px;
  font-weight: 600;
  color: #555;
  padding: 2px 0;
  text-align: center;
  letter-spacing: 0.03em;
}

.slip-dash {
  border: none;
  border-top: 1.5px dashed #ccc;
  margin: 20px 0 16px;
}

.from-kw {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: #bbb;
  margin-bottom: 6px;
  text-align: center;
}
.from-name {
  font-size: 13px;
  font-weight: 700;
  color: #222;
  text-align: center;
}
.from-addr {
  font-size: 12px;
  color: #666;
  margin-top: 3px;
  line-height: 1.7;
  text-align: center;
}
/* Sender mobile on slip */
.from-mob {
  font-size: 12px;
  font-weight: 600;
  color: #444;
  margin-top: 4px;
  text-align: center;
}

/* ── SLIP ACTIONS ── */
.slip-actions { display: flex; gap: 10px; margin-bottom: 8px; }
.btn-print {
  flex: 1;
  padding: 13px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(34,201,122,0.3);
  transition: opacity 0.2s;
}
.btn-print:hover { opacity: 0.88; }
.btn-new {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--text-dim);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-new:hover { color: var(--text); border-color: var(--text-dim); }

/* Hidden sender card — holds data, invisible in UI */
#sender-card { display: none; }

@media (max-width: 700px) {
  .row3 { grid-template-columns: 1fr; }
  .hdr-badge { display: none; }
  .slip-actions { flex-direction: column; }
}

@media print {
  body { background: #fff; padding: 0; }
  #form-area, #form-actions, .btn-print, .btn-new, .hdr { display: none !important; }
  .page { max-width: 100%; padding: 8px; }
  #slip-section { display: block !important; }
  .slip-wrap { background: #fff; box-shadow: none; padding: 0; border: none; border-radius: 0; }
  .slip-label { border: 2px solid #111; }
  .slip-actions { display: none !important; }
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">C</div>
    <div class="hdr-info">
      <div class="hdr-title">Courier Slip Generator</div>
      <div class="hdr-sub">Courier Slip &nbsp;·&nbsp; PIN auto-fills City, District &amp; State</div>
    </div>
    <div class="hdr-badge">INTERNAL TOOL</div>
  </div>

  <!-- FORM -->
  <div id="form-area">

    <!-- RECEIVER (TO) — full width -->
    <div class="card highlight">
      <div class="sec-label">
        <span class="dot dot-green"></span>Receiver (To)
      </div>
      <div class="fl">
        <label>Company / Receiver Name</label>
        <input type="text" id="r-name" placeholder="e.g. SP Singh" autofocus>
      </div>
      <div class="fl">
        <label>Mobile</label>
        <input type="text" id="r-mobile" maxlength="10" placeholder="10-digit">
      </div>
      <div class="fl">
        <label>Street / Building Address</label>
        <textarea id="r-addr" placeholder="Shop No., Street, Area..."></textarea>
      </div>
      <div class="fl">
        <label>PIN Code</label>
        <div class="pin-wrap">
          <input type="text" id="r-pin" maxlength="6" placeholder="6-digit PIN"
            oninput="this.value=this.value.replace(/\D/g,'');if(this.value.length===6)lookupPin('r')">
          <button class="pin-btn" id="r-btn" onclick="lookupPin('r')">Search</button>
        </div>
        <div class="pin-msg" id="r-msg"></div>
      </div>
      <div class="row3">
        <div class="fl"><label>City / PO</label><input type="text" id="r-city" readonly placeholder="Auto-filled"></div>
        <div class="fl"><label>District</label><input type="text" id="r-dist" readonly placeholder="Auto-filled"></div>
        <div class="fl"><label>State</label><input type="text" id="r-state" readonly placeholder="Auto-filled"></div>
      </div>
    </div>

    <!-- SENDER — hidden in UI, all values hardcoded via JS -->
    <div id="sender-card">
      <input type="text" id="s-name">
      <input type="text" id="s-mobile">
      <textarea id="s-addr"></textarea>
      <input type="text" id="s-pin">
      <input type="text" id="s-city">
      <input type="text" id="s-dist">
      <input type="text" id="s-state">
    </div>

  </div><!-- /form-area -->

  <!-- ACTIONS -->
  <div id="form-actions" class="actions">
    <button class="btn-gen" onclick="generateSlip()">📋 Generate Courier Slip</button>
    <button class="btn-clr" onclick="clearAll()">Clear</button>
  </div>

  <!-- ─── SLIP OUTPUT ─── -->
  <div id="slip-section">
    <div class="slip-wrap">
      <div class="slip-label">

        <div class="slip-lbody">

          <!-- TO -->
          <div class="to-kw">— To —</div>
          <div class="to-company" id="sl-dest"></div>

          <div class="addr-block">
            <span class="addr-line"><span class="val" id="sl-r-street"></span></span>
            <span class="addr-line"><span class="val" id="sl-r-area"></span></span>
            <span class="addr-line"><span class="val" id="sl-r-city-st"></span></span>
          </div>

          <div class="pin-line" id="sl-r-pin"></div>
          <div class="mob-line" id="sl-r-mob"></div>

          <hr class="slip-dash">

          <!-- FROM -->
          <div class="from-kw">From</div>
          <div class="from-name" id="sl-s-name"></div>
          <div class="from-addr" id="sl-s-addr"></div>
          <div class="from-mob"  id="sl-s-mob"></div>

        </div>

      </div><!-- /slip-label -->
    </div><!-- /slip-wrap -->

    <div class="slip-actions">
      <button class="btn-print" onclick="window.print()">🖨 Print / Save PDF</button>
    </div>
    <button class="btn-new" onclick="clearAll()">← Create New Slip</button>
  </div>

</div><!-- /page -->

<script>
/* ── PIN Lookup ── */
async function lookupPin(side) {
  const pinEl = document.getElementById(side + '-pin');
  const pin   = pinEl.value.trim();
  const msg   = document.getElementById(side + '-msg');
  const btn   = document.getElementById(side + '-btn');

  if (!/^\d{6}$/.test(pin)) {
    if (msg) { msg.className = 'pin-msg err'; msg.textContent = 'Enter a valid 6-digit PIN code.'; }
    return;
  }
  if (msg) { msg.className = 'pin-msg loading'; msg.textContent = '⟳ Searching…'; }
  if (btn) btn.disabled = true;
  ['city','dist','state'].forEach(f => { const el = document.getElementById(side+'-'+f); if(el) el.value = ''; });

  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    const res  = await fetch('https://api.postalpincode.in/pincode/' + pin, { signal: ctrl.signal });
    clearTimeout(t);
    const data = await res.json();

    if (data?.[0]?.Status === 'Success' && data[0].PostOffice?.length > 0) {
      const po = data[0].PostOffice[0];
      document.getElementById(side+'-city').value  = po.Name     || '';
      document.getElementById(side+'-dist').value  = po.District || '';
      document.getElementById(side+'-state').value = po.State    || '';
      if (msg) {
        msg.className = 'pin-msg ok';
        const ct = data[0].PostOffice.length;
        msg.textContent = '✓ ' + po.Name + ', ' + po.District + ', ' + po.State +
          (ct > 1 ? ' (' + ct + ' post offices)' : '');
      }
    } else { manualEntry(side, msg); }
  } catch { manualEntry(side, msg); }
  if (btn) btn.disabled = false;
}

function manualEntry(side, msg) {
  ['city','dist','state'].forEach(f => {
    const el = document.getElementById(side+'-'+f);
    if (el) {
      el.removeAttribute('readonly');
      el.style.background  = 'rgba(240,165,0,0.06)';
      el.style.borderColor = 'var(--amber)';
      el.placeholder = 'Enter manually';
    }
  });
  if (msg) { msg.className = 'pin-msg err'; msg.textContent = '⚠ Auto-fetch failed.'; }
}

function g(id) { return (document.getElementById(id)?.value || '').trim(); }

/* ── Generate ── */
function generateSlip() {
  const sName  = g('s-name'), sMob = g('s-mobile');
  const sAddr  = g('s-addr'), sPin = g('s-pin');
  const sCity  = g('s-city'), sDist = g('s-dist'), sSt = g('s-state');
  const rName  = g('r-name'), rMob = g('r-mobile');
  const rAddr  = g('r-addr'), rPin = g('r-pin');
  const rCity  = g('r-city'), rDist = g('r-dist'), rSt = g('r-state');

  if (!rName) { alert('Please enter Receiver Name.'); document.getElementById('r-name').focus(); return; }
  if (!rPin)  { alert('Please enter Receiver PIN Code.'); document.getElementById('r-pin').focus(); return; }
  if (!sName) { alert('Sender name is missing.'); return; }
  if (!sPin)  { alert('Sender PIN is missing.'); return; }

  // TO section
  document.getElementById('sl-dest').textContent      = rName.toUpperCase();
  document.getElementById('sl-r-street').textContent  = rAddr || '';
  document.getElementById('sl-r-area').textContent    = [rDist, rSt].filter(Boolean).join(', ');
  document.getElementById('sl-r-city-st').textContent = [rCity, rSt].filter(Boolean).join(', ');
  document.getElementById('sl-r-pin').textContent     = 'PIN: ' + rPin;
  document.getElementById('sl-r-mob').textContent     = rMob ? 'Mob: +91 ' + rMob : '';

  // FROM section — name, address, and mobile
  document.getElementById('sl-s-name').textContent = sName;
  document.getElementById('sl-s-addr').textContent = [sAddr, sCity, sDist, sSt, 'PIN: ' + sPin]
    .filter(Boolean).join(', ');
  document.getElementById('sl-s-mob').textContent  = sMob ? 'Mob: ' + sMob : '';

  document.getElementById('form-area').style.display    = 'none';
  document.getElementById('form-actions').style.display = 'none';
  document.getElementById('slip-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Clear ── */
function clearAll() {
  ['r-name','r-mobile','r-addr','r-pin'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('s-pin').value = '226023';

  ['s','r'].forEach(side => {
    ['city','dist','state'].forEach(f => {
      const el = document.getElementById(side+'-'+f);
      if (el) {
        el.value = ''; el.setAttribute('readonly','');
        el.style.background = ''; el.style.borderColor = '';
        el.placeholder = 'Auto-filled';
      }
    });
    const msg = document.getElementById(side+'-msg');
    if (msg) msg.textContent = '';
  });

  document.getElementById('slip-section').style.display  = 'none';
  document.getElementById('form-area').style.display     = 'block';
  document.getElementById('form-actions').style.display  = 'flex';

  // Re-apply hardcoded sender values
  document.getElementById('s-name').value   = 'Unique Surgical';
  document.getElementById('s-mobile').value = '+91 8920489022';
  document.getElementById('s-pin').value    = '110092';
  document.getElementById('s-city').value   = 'D-10 Pandav Nagar';
  document.getElementById('s-dist').value   = 'East Delhi';
  document.getElementById('s-state').value  = 'Delhi';
  document.getElementById('r-name').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── On load: set sender data statically (no API call needed) ── */
window.addEventListener('DOMContentLoaded', () => {
  const SENDER = {
    name  : 'Unique Surgical',
    mobile: '+91 8920489022',
    addr  : '',
    pin   : '110092',
    city  : 'D-10 Pandav Nagar',
    dist  : 'East Delhi',
    state : 'Delhi'
  };
  document.getElementById('s-name').value   = SENDER.name;
  document.getElementById('s-mobile').value = SENDER.mobile;
  document.getElementById('s-addr').value   = SENDER.addr;
  document.getElementById('s-pin').value    = SENDER.pin;
  document.getElementById('s-city').value   = SENDER.city;
  document.getElementById('s-dist').value   = SENDER.dist;
  document.getElementById('s-state').value  = SENDER.state;
});
</script>
</body>
</html>
